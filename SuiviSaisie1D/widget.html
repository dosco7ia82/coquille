<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de la saisie</title>
<!--
  ============================================================
  Widget personnalisé Grist (Custom Widget).
  À ajouter via : Add Widget → Custom → URL de cette page, puis
  lier le widget à la vue voulue ("Select by") pour qu'il ne
  reçoive que les lignes filtrées/visibles de cette vue.
  Pas de mapping de colonnes ici (volontairement) : déclarer un
  mapping restreint aussi l'accès de fetchSelectedTable() aux
  seules colonnes mappées, ce qui casserait l'export complet.
  Les noms de colonnes réels sont donc en dur ci-dessous (COL_*).
  ============================================================
-->
<script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
    --blue-france-main-525: #000091;
    --error-425: #ce0500;
    --success-425: #18753c;
    --text-mention-grey: #666666;
    --border-default-grey: #dddddd;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 1rem;
    font-family: Marianne, Arial, sans-serif;
    color: #161616;
}
.column p {
    margin: .2rem 0;
}
.columns {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
}
.column {
    flex: 1 1 240px;
    min-width: 240px;
    padding-right: 1.5rem;
    border-right: 1px solid var(--border-default-grey);
}
.column:last-child {
    border-right: none;
    padding-right: 0;
}
#summary {
    font-size: 1.05rem;
}
#campagneInfo p {
    margin: .15rem 0;
    font-size: .8rem;
    line-height: 1.25;
}
.nowrap {
    white-space: nowrap;
}
#summary strong {
    color: var(--blue-france-main-525);
}
h2 {
    font-size: .95rem;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-mention-grey);
    margin: 0 0 .6rem;
}
button {
    background: var(--blue-france-main-525);
    color: #fff;
    border: none;
    border-radius: .25rem;
    padding: .6rem 1.2rem;
    font-weight: 700;
    font-size: .95rem;
    cursor: pointer;
}
button:disabled {
    opacity: .5;
    cursor: default;
}
#copyFeedback, #downloadFeedback {
    display: block;
    margin-top: .6rem;
    font-size: .9rem;
    color: var(--success-425);
}
#copyFeedback.error, #downloadFeedback.error {
    color: var(--error-425);
}
#emailsFallback {
    display: none;
    margin-top: .75rem;
    width: 100%;
    font-family: monospace;
    font-size: .85rem;
    padding: .5rem;
}
</style>
</head>
<body>

<div class="columns">

    <div class="column">
        <h2 id="campagneTitle">Campagne de saisie</h2>
        <div id="campagneInfo">Chargement…</div>
    </div>

    <div class="column">
        <h2>Suivre la saisie</h2>
        <div id="summary">Chargement…</div>
    </div>

    <div class="column">
        <h2>Relancer les écoles qui n'ont pas encore saisi</h2>
        <button id="copyBtn" disabled>Copier les adresses e-mail</button>
        <span id="copyFeedback"></span>
        <textarea id="emailsFallback" rows="3" readonly></textarea>
    </div>

    <div class="column">
        <h2>Exporter la table</h2>
        <button id="downloadBtn" disabled>Télécharger les données en .xlsx</button>
        <span id="downloadFeedback"></span>
    </div>

</div>

<script>
const COL_SAISIE = 'Saisie_completee';
const COL_EMAIL = 'email_ecole';

// Webhook n8n : renvoie les dates d'une campagne à partir de son ID_campagne.
// Utilisé plutôt qu'un accès Grist direct, pour que les rôles n'ayant pas
// accès à Campagnes_de_saisie voient quand même ces dates dans le widget.
const CONFIG = {
    webhookCampagne: 'https://n8n.incubateur.education.gouv.fr/webhook/cd166af6-12a5-4017-9ff2-338e76509818',
};

// Toute lecture passe par fetchSelectedTable() : onRecords() ne renvoie que
// les colonnes visibles dans la vue liée, ce qui masque des champs comme
// Etat ou ID_campagne quand ils sont cachés côté Grist.
let tableData = null;
let rows = [];

grist.ready({
    requiredAccess: 'read table',
});

grist.onRecords(() => {
    refresh();
});

async function refresh() {
    try {
        tableData = await grist.fetchSelectedTable({ includeColumns: 'normal' });
        rows = toRowObjects(tableData);
    } catch (err) {
        tableData = null;
        rows = [];
    }
    render();
    renderCampagne();
}

function toRowObjects(table) {
    if (!table || !table.id) return [];
    const columns = Object.keys(table);
    const out = [];
    for (let i = 0; i < table.id.length; i++) {
        const row = {};
        for (const col of columns) row[col] = table[col][i];
        out.push(row);
    }
    return out;
}

function firstDefined(values) {
    return (values || []).find(v => v !== undefined && v !== null);
}

function formatDateHeure(ts) {
    if (!ts) return '';
    const date = new Date(ts * 1000);
    if (isNaN(date)) return String(ts);
    const datePart = new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', day: 'numeric', month: 'long', year: 'numeric',
    }).format(date);
    const timePart = new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit',
    }).format(date).replace(':', 'h');
    return `${datePart} à ${timePart}`;
}

function formatJourLong(ts) {
    return new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', weekday: 'long', day: 'numeric', month: 'long',
    }).format(new Date(ts * 1000));
}

function formatHeure(ts) {
    return new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit',
    }).format(new Date(ts * 1000)).replace(':', 'h');
}

function jourISO(ts) {
    return new Intl.DateTimeFormat('fr-FR', {
        timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit',
    }).format(new Date(ts * 1000));
}

function memeJour(ts1, ts2, ts3) {
    return jourISO(ts1) === jourISO(ts2) && jourISO(ts2) === jourISO(ts3);
}

async function renderCampagne() {
    const container = document.getElementById('campagneInfo');
    const titleEl = document.getElementById('campagneTitle');

    const rentree = tableData ? firstDefined(tableData.Rentree_scolaire) : undefined;
    titleEl.textContent = rentree
        ? `Constat rapide de rentrée ${rentree}`
        : 'Constat rapide de rentrée';

    try {
        // Une seule campagne active à la fois : le webhook cherche lui-même
        // la campagne ouverte, pas besoin de connaître ID_campagne ici (dont
        // l'accès dépend des permissions Grist selon le rôle connecté).
        const res = await fetch(CONFIG.webhookCampagne, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({}),
        });
        if (!res.ok) throw new Error(`Erreur serveur (HTTP ${res.status}).`);
        const campagne = await res.json();

        if (!campagne || !campagne.Date_debut) {
            container.textContent = '';
            return;
        }

        const { Date_debut, Date_fin_ECOLE, Date_fin_CIRCO } = campagne;

        if (Date_fin_ECOLE && Date_fin_CIRCO && memeJour(Date_debut, Date_fin_ECOLE, Date_fin_CIRCO)) {
            container.innerHTML = `
                <p><strong>Le ${formatJourLong(Date_debut)}</strong></p>
                <p>Ouverture de la saisie : ${formatHeure(Date_debut)}</p>
                <p>Fin saisie écoles : ${formatHeure(Date_fin_ECOLE)}</p>
                <p>Fin saisie circos : ${formatHeure(Date_fin_CIRCO)}</p>
                <p><i>Peu après la fin de la campagne, vous serez destinataire du fichier compilé.</i></p>
            `;
        } else {
            container.innerHTML = `
                <p>Ouverture de la saisie : <span class="nowrap">${formatDateHeure(Date_debut)}</span></p>
                <p>Fin saisie Écoles : <span class="nowrap">${formatDateHeure(Date_fin_ECOLE)}</span></p>
                <p>Fin recadrage Circos : <span class="nowrap">${formatDateHeure(Date_fin_CIRCO)}</span></p>
                <p><i>Dans l'heure suivant la fin de la campagne, vous serez destinataire du fichier compilé.</i></p>
            `;
        }
    } catch (err) {
        container.textContent = 'Erreur de chargement des dates de campagne : ' + err.message;
    }
}

function formatPourcentage(done, total) {
    if (total === 0) return '0 %';
    const raw = (done / total) * 100;
    if (raw > 0 && raw < 1) {
        return `${raw.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} %`;
    }
    return `${Math.round(raw)} %`;
}

function render() {
    const ecolesOuvertes = rows.filter(r => r.Etat === 'Ouverte');
    const total = ecolesOuvertes.length;
    const done = ecolesOuvertes.filter(r => r[COL_SAISIE] === true).length;

    const doneEcole = done <= 1 ? 'école' : 'écoles';
    const doneVerbe = done <= 1 ? 'a saisi' : 'ont saisi';
    const donePossessif = done <= 1 ? 'ses' : 'leurs';
    const totalEcole = total <= 1 ? 'école' : 'écoles';
    const pct = formatPourcentage(done, total);

    document.getElementById('summary').innerHTML =
        `<strong>${done}</strong> ${doneEcole} ${doneVerbe} ${donePossessif} effectifs, sur <strong>${total}</strong> ${totalEcole}, soit <strong>${pct}</strong>.`;

    document.getElementById('copyBtn').disabled = total === 0;
    document.getElementById('downloadBtn').disabled = total === 0;
}

document.getElementById('copyBtn').addEventListener('click', async () => {
    const feedback = document.getElementById('copyFeedback');
    const fallback = document.getElementById('emailsFallback');
    feedback.classList.remove('error');
    fallback.style.display = 'none';

    const emails = rows
        .filter(r => r.Etat === 'Ouverte' && r[COL_SAISIE] !== true && r[COL_EMAIL])
        .map(r => `<${r[COL_EMAIL]}>`);

    if (emails.length === 0) {
        feedback.textContent = 'Toutes les écoles ont saisi leurs effectifs.';
        return;
    }

    const text = emails.join(', ');

    try {
        await navigator.clipboard.writeText(text);
        feedback.textContent = `${emails.length} adresse(s) copiée(s) dans le presse-papier.`;
    } catch (err) {
        feedback.textContent = 'Copie automatique impossible, sélectionnez le texte ci-dessous.';
        feedback.classList.add('error');
        fallback.value = text;
        fallback.style.display = 'block';
        fallback.select();
    }
});

const EXPORT_HIDDEN_COLUMNS = [
    'Etat', 'Etat2', 'ID_campagne', 'Secteur', 'Cree_le', 'Cree_par',
    'Derniere_mise_a_jour', 'UUID', 'Ecole_nom_complet', 'Data_campagne',
    'Date_campagne', 'id', 'TPS_ULIS', 'PS_ULIS', 'MS_ULIS', 'GS_ULIS', 'manualSort',
];

function moveAfter(order, colsToMove, afterCol) {
    const existing = colsToMove.filter(c => order.includes(c));
    const remaining = order.filter(c => !existing.includes(c));
    const idx = remaining.indexOf(afterCol);
    if (idx === -1) return order;
    return [
        ...remaining.slice(0, idx + 1),
        ...existing,
        ...remaining.slice(idx + 1),
    ];
}

function buildExportColumnOrder(rawColumns) {
    let order = rawColumns.filter(c => !EXPORT_HIDDEN_COLUMNS.includes(c));
    order = moveAfter(order, ['Circo', 'UAI', 'Sigle', 'Denomination', 'Commune'], 'Rentree_scolaire');
    order = moveAfter(order, ['Total_Preelem'], 'GS');
    order = moveAfter(order, ['Total_Elem'], 'CM2');
    order = moveAfter(order, ['Total_eleves_ULIS_inclus'], 'Total_Elem');
    order = moveAfter(order, ['Total_eleves_hors_ULIS'], 'Total_eleves_ULIS_inclus');
    order = moveAfter(order, ['Total_eleves_ULIS_uniquement'], 'Total_eleves_hors_ULIS');
    return order;
}

document.getElementById('downloadBtn').addEventListener('click', async () => {
    const feedback = document.getElementById('downloadFeedback');
    const btn = document.getElementById('downloadBtn');
    feedback.classList.remove('error');
    feedback.textContent = 'Préparation du fichier…';
    btn.disabled = true;

    try {
        const table = tableData || await grist.fetchSelectedTable({ includeColumns: 'normal' });
        const columnOrder = buildExportColumnOrder(Object.keys(table));
        const rowCount = table.id.length;

        const exportRows = [];
        for (let i = 0; i < rowCount; i++) {
            if (table.Etat[i] !== 'Ouverte') continue;
            const row = {};
            for (const name of columnOrder) {
                row[name] = table[name][i];
            }
            exportRows.push(row);
        }

        const worksheet = XLSX.utils.json_to_sheet(exportRows, { header: columnOrder });
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Effectifs');

        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(workbook, `effectifs_${dateStr}.xlsx`);

        feedback.textContent = 'Téléchargement lancé.';
    } catch (err) {
        feedback.textContent = "Erreur lors de l'export : " + err.message;
        feedback.classList.add('error');
    } finally {
        btn.disabled = rows.length === 0;
    }
});
</script>

</body>
</html>
