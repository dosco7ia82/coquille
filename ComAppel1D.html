<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#000091;--red:#e1000f;--gray:#9c9c9a;
  --border:1.5px solid #ddd;
  --radius:10px;
}
body{font-family:'Outfit',sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1a1a1a}
#app{display:flex;flex-direction:column;height:100vh;padding:12px;gap:10px}

/* fullscreen mode tweaks */
#app:fullscreen{background:#f5f5f5;padding:18px}
#app:-webkit-full-screen{background:#f5f5f5;padding:18px}

/* repli "plein écran logiciel" si l'API native est indisponible (ex: iframe Grist sous Firefox) */
#app.pseudo-fullscreen{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  z-index:2147483647;
  background:#f5f5f5;
  padding:18px;
}

#main{display:flex;gap:12px;flex:1;min-height:0}
#left-col{width:20%;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
#creneau-bar{
  background:#f5f5f5;
  border:var(--border);
  border-radius:var(--radius);
  text-align:center;
  padding:10px 14px;
  flex-shrink:0;
}
#creneau-label{font-size:18px;color:#555;text-transform:uppercase;letter-spacing:.05em}
#creneau-val{font-size:24px;font-weight:600;color:var(--blue);margin-top:2px}
#sidebar{flex:1;background:#fff;border:var(--border);border-radius:var(--radius);padding:18px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
#nom-title{font-size:32px;font-weight:600;color:#1a1a1a;line-height:1.2}
.side-field{font-size:24px;color:#333;line-height:1.5}
.side-label{font-size:18px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.sep{border:none;border-top:1px solid #eee}

#content-area{flex:1;min-width:0;display:flex;flex-direction:column;gap:0}
#big-frame{flex:1;min-height:0;background:#fff;border:var(--border);border-radius:var(--radius);position:relative;overflow:hidden;display:flex;flex-direction:column}

#chat-area{flex:1;min-height:0;display:flex;flex-direction:column;padding:16px;gap:14px;overflow-y:auto;transition:filter .6s ease,opacity .6s ease}
#chat-area.masked{filter:blur(5px);opacity:0}

.bubble-wrap{display:flex;flex-direction:column;gap:4px}
.bubble-author{font-size:18px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding-left:4px;margin-bottom:.5em}
.bubble-author.right{text-align:right;padding-left:0;padding-right:4px;color:#555}
.bubble{
  max-width:720px;
  padding:12px 16px;
  border-radius:18px;
  font-size:24px;
  line-height:1.65;
  color:#222;
  background:#eef0fb;
  border-bottom-left-radius:4px;
  align-self:flex-start;
}
.bubble.right{
  background:#f0f0f0;
  border-bottom-left-radius:18px;
  border-bottom-right-radius:4px;
  align-self:flex-end;
  color:#333;
}
#avis-cdm-text{background:#ffffc4}
#avis-ien-text{background:#e1f5fe}
.sig-ien{font-size:15px;color:#888;font-style:italic;align-self:flex-end;margin-top:.25em;padding-right:4px}

#logo-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;pointer-events:none;opacity:.8;z-index:10;background:white;padding:1em;}
#logo-overlay svg{width:350px;height:auto}

#bottom-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:4px 2px 0;flex-shrink:0}
.nav-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-btn:hover{opacity:.85}
.ctrl-btn{background:#fff;border:var(--border);border-radius:50%;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#333;flex-shrink:0;transition:background .15s}
.ctrl-btn:hover{background:#f0f0f0}

/* Minuteur "camembert" : disque plein dont le quartier se vide au fil du temps */
#timer-pie{
  position:relative;
  width:38px;height:38px;
  flex-shrink:0;
  border-radius:50%;
  background:#e8e8e8;
  box-shadow:inset 0 0 0 1.5px #ddd;
}
#timer-pie::before{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  /* var(--pct) = pourcentage de temps restant, 100 -> 0 */
  background:conic-gradient(var(--blue) calc(var(--pct,100) * 1%), transparent calc(var(--pct,100) * 1%));
  transition:background .9s linear;
}

#status-banner{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:#fff;font-size:14px;
  padding:8px 18px;border-radius:8px;
  z-index:1000;opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#status-banner.show{opacity:.92}
#status-banner.error{background:var(--red)}
</style>
</head>

<script>
const TIMER_DURATION = 180;

let records = [];
let currentIdx = 0;
let timerSec = TIMER_DURATION;
let timerInterval = null;
let masked = false;
let timerRunning = false;

function extractDeltaText(raw) {
  if (!raw) return '';
  if (typeof raw !== 'string') return String(raw);
  const s = raw.trim();
  if (s.startsWith('{') || s.startsWith('[')) {
    try {
      const obj = JSON.parse(s);
      if (obj && Array.isArray(obj.ops)) {
        return obj.ops.map(op => (typeof op.insert === 'string' ? op.insert : '')).join('').trim();
      }
    } catch(e) {}
  }
  return raw;
}

function cap(str){if(!str)return'';return str.charAt(0).toUpperCase()+str.slice(1)}

function formatNaissance(val) {
  if (!val) return '—';
  let d;
  if (val instanceof Date) d = val;
  else if (typeof val === 'number') d = new Date(val < 1e12 ? val * 1000 : val); // secondes vs ms
  else d = new Date(val);
  return isNaN(d.getTime()) ? String(val) : d.toLocaleDateString('fr-FR');
}

function renderRecord(record) {
  document.getElementById('creneau-val').textContent = record.Heure || '—';
  document.getElementById('nom-title').textContent = (record.Nom || '') + '\n' + (record.Prenom || '');
  const e = record.Genre === 'F' ? 'e' : '';
  document.getElementById('naissance').textContent = 'Né' + e + ' le ' + formatNaissance(record.Date_de_naissance);
  document.getElementById('age').textContent = record.Age;
  document.getElementById('niveau').textContent = cap(record.Niveau_actuel);
  document.getElementById('decision').textContent = cap(record.Decision_Ecole_long_);
  document.getElementById('voeu').textContent = cap(record.Voeu_Resp_legaux_long_);
  document.getElementById('ecole').textContent = resolveEcole(record.Ecole);
  document.getElementById('circo').textContent = record.Circonscription || '';
  document.getElementById('avis-cdm-text').innerHTML = (record.Avis_CDM || '').replace(/\n/g, "<br>");
  document.getElementById('avis-ien-text').innerHTML = (record.Avis_IEN || '').replace(/\n/g, "<br>");
  document.getElementById('sig-ien').textContent = record.IEN ? record.IEN + ', IEN' : '';
  resetTimer();
  startTimer();
}

function updatePie() {
  const frac = Math.max(0, timerSec / TIMER_DURATION);
  document.getElementById('timer-pie').style.setProperty('--pct', (frac * 100).toFixed(2));
}

function applyMask(state) {
  masked = state;
  const chat = document.getElementById('chat-area');
  const logo = document.getElementById('logo-overlay');
  if (state) { chat.classList.add('masked'); logo.style.display = 'block'; }
  else { chat.classList.remove('masked'); logo.style.display = 'none'; }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
}

function resetTimer() {
  stopTimer();
  timerSec = TIMER_DURATION;
  updatePie();
  applyMask(false);
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerSec--;
    updatePie();
    if (timerSec <= 0) {
      stopTimer();
      applyMask(true);
    }
  }, 1000);
}

document.getElementById('btn-toggle').addEventListener('click', () => {
  if (timerRunning) {
    stopTimer();
    applyMask(true);
    document.getElementById('btn-toggle').querySelector('i').className = 'ti ti-eye';
  } else {
    applyMask(false);
    resetTimer();
    startTimer();
    document.getElementById('btn-toggle').querySelector('i').className = 'ti ti-eye-off';
  }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (!records.length) return;
  currentIdx = (currentIdx - 1 + records.length) % records.length;
  renderRecord(records[currentIdx]);
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (!records.length) return;
  currentIdx = (currentIdx + 1) % records.length;
  renderRecord(records[currentIdx]);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    document.getElementById('btn-prev').click();
  } else if (e.key === 'ArrowRight') {
    document.getElementById('btn-next').click();
  }
});

// --- Plein écran (avec repli si l'API native est bloquée, ex: Firefox + iframe Grist) ---
const appEl = document.getElementById('app');
const fsBtn = document.getElementById('btn-fullscreen');
let pseudoFs = false;

function isNativeFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function isFullscreen() {
  return isNativeFullscreen() || pseudoFs;
}

function updateFsIcon() {
  const icon = fsBtn.querySelector('i');
  icon.className = isFullscreen() ? 'ti ti-minimize' : 'ti ti-maximize';
  fsBtn.title = isFullscreen() ? 'Quitter le plein écran (Échap)' : 'Plein écran (Échap pour quitter)';
}

function enterPseudoFullscreen() {
  pseudoFs = true;
  appEl.classList.add('pseudo-fullscreen');
  document.addEventListener('keydown', onEscKey);
  updateFsIcon();
}

function exitPseudoFullscreen() {
  pseudoFs = false;
  appEl.classList.remove('pseudo-fullscreen');
  document.removeEventListener('keydown', onEscKey);
  updateFsIcon();
}

function onEscKey(e) {
  if (e.key === 'Escape' && pseudoFs) exitPseudoFullscreen();
}

fsBtn.addEventListener('click', () => {
  if (isFullscreen()) {
    if (isNativeFullscreen()) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    if (pseudoFs) exitPseudoFullscreen();
    return;
  }

  let req = null;
  if (appEl.requestFullscreen) req = appEl.requestFullscreen();
  else if (appEl.webkitRequestFullscreen) { appEl.webkitRequestFullscreen(); }

  if (req && typeof req.then === 'function') {
    req.catch(() => enterPseudoFullscreen());
  } else if (!appEl.requestFullscreen && !appEl.webkitRequestFullscreen) {
    enterPseudoFullscreen();
  } else {
    // Pas de Promise (vieux WebKit) : on vérifie après coup si ça a marché
    setTimeout(() => { if (!isNativeFullscreen()) enterPseudoFullscreen(); }, 150);
  }
});

document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);

// ============================================================
// CONFIG — page autonome alimentée par un nœud n8n "Grist Read"
// ============================================================
// URL du webhook n8n qui expose la sortie du nœud Grist Read
// (un tableau JSON d'enregistrements, un objet par ligne Grist,
// avec les mêmes noms de champs que dans Grist : Nom, Prenom,
// Heure, Date_de_naissance, Avis_CDM, Avis_IEN, Ecole, etc.)
const DATA_URL = 'https://n8n.incubateur.education.gouv.fr/webhook/483ffae5-c7bb-4dcd-acd1-474d5d1b9f45';

// La colonne $Ecole de la table principale est une Référence vers
// la table AnnuaireCopie : son nœud Grist Read ne renvoie que
// l'ID de ligne, pas le libellé. On charge donc séparément la
// table AnnuaireCopie (via un second webhook n8n) pour résoudre
// l'ID vers la colonne Ecole_concat_.
const ECOLES_DATA_URL = 'https://n8n.incubateur.education.gouv.fr/webhook/3df3b004-efad-40df-8381-46f770586962';

// Paramètre transmis dans l'URL de la page (ex. .../widget.html?uuid_com=xxxx)
// et retransmis au webhook n8n pour filtrer la table ComAppel côté serveur.
const pageParams = new URLSearchParams(window.location.search);
const UUID_COM = pageParams.get('uuid_com') || '';

// Intervalle de rafraîchissement automatique des données (ms).
// Mettre à 0 pour désactiver le rafraîchissement automatique
// (seul le bouton "recharger" ou le chargement initial agira).
const POLL_INTERVAL_MS = 0;
// ============================================================

function showStatus(msg, isError) {
  const el = document.getElementById('status-banner');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
}

function hideStatus() {
  document.getElementById('status-banner').classList.remove('show');
}

function normalizeRecord(raw) {
  // Tolère les variantes de sortie n8n : item plat, ou {json: {...}}
  const r = raw && raw.json ? raw.json : raw;
  return r;
}

// Table de correspondance ID AnnuaireCopie -> libellé Ecole_concat_
let ecolesById = {};

async function loadEcoles() {
  try {
    const res = await fetch(ECOLES_DATA_URL, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (Array.isArray(data.records) ? data.records : []);
    const map = {};
    list.map(normalizeRecord).filter(Boolean).forEach(r => {
      const id = r.id != null ? r.id : r.Id;
      if (id != null) map[id] = r.Ecole_concat_ || '';
    });
    ecolesById = map;
  } catch (err) {
    console.warn('Impossible de charger AnnuaireCopie (référence Ecole) :', err.message);
  }
}

function resolveEcole(val) {
  if (val == null || val === '') return '';
  // Référence Grist déjà résolue (texte) : on la garde telle quelle
  if (typeof val === 'string' && isNaN(Number(val))) return val;
  // Référence Grist brute : peut être un nombre, une chaîne numérique,
  // ou le format API Grist ['R', tableId, rowId]
  let id = val;
  if (Array.isArray(val) && val.length >= 3) id = val[2];
  else if (val && typeof val === 'object' && 'rowId' in val) id = val.rowId;
  return (id in ecolesById) ? ecolesById[id] : String(val);
}

async function loadRecords({ silent } = {}) {
  if (!UUID_COM) {
    showStatus("Paramètre 'uuid_com' manquant dans l'URL de la page.", true);
    return;
  }
  if (!silent) showStatus('Chargement des données…');
  try {
    const url = new URL(DATA_URL);
    if (UUID_COM) url.searchParams.set('uuid_com', UUID_COM);
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (Array.isArray(data.records) ? data.records : []);
    let normalized = list.map(normalizeRecord).filter(Boolean);

    // Filtre : on exclut les enregistrements annulés
    normalized = normalized.filter(r => r.Statut !== 'Annulé');

    // Tri : par créneau horaire (Heure) croissant
    normalized.sort((a, b) => {
      const ha = (a.Heure ?? '').toString();
      const hb = (b.Heure ?? '').toString();
      return ha.localeCompare(hb, 'fr', { numeric: true, sensitivity: 'base' });
    });

    if (!normalized.length) {
      showStatus("Aucun enregistrement reçu.", true);
      return;
    }

    // Conserve la position si possible (par id), sinon revient au début.
    const prevId = records[currentIdx] ? records[currentIdx].id : null;
    records = normalized;
    const keepIdx = prevId != null ? records.findIndex(r => r.id === prevId) : -1;
    currentIdx = keepIdx >= 0 ? keepIdx : 0;

    renderRecord(records[currentIdx]);
    hideStatus();
  } catch (err) {
    showStatus('Erreur de chargement : ' + err.message, true);
  }
}

document.getElementById('btn-reload').addEventListener('click', () => {
  loadEcoles().then(() => loadRecords());
});

// Chargement initial : on résout d'abord la table de référence des
// écoles, puis on charge les enregistrements (pour un affichage
// correct dès le premier rendu).
loadEcoles().then(() => loadRecords());

// Rafraîchissement automatique optionnel
if (POLL_INTERVAL_MS > 0) {
  setInterval(() => loadRecords({ silent: true }), POLL_INTERVAL_MS);
}
</script>
